name: bau-do-chef

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    container_name: bau-do-chef-backend
    ports:
      - "3333:3333"
    volumes:
      - ./server/database:/app/server/database
    environment:
      PORT: "3333"
      DATABASE_PATH: /app/server/database/receitas.json
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: bau-do-chef-app
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - bau_do_chef_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_BASE_URL: "http://localhost:3333"
    command: tail -f /dev/null
    stdin_open: true
    tty: true
    restart: unless-stopped

volumes:
  bau_do_chef_node_modules:
  